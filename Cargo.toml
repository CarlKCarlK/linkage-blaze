[workspace]
members = [
    "crates/cyd-esp32",
    "crates/robot-arm-core",
    "crates/robot-arm-cyd",
    "crates/robot-arm-cyd-clock",
    "crates/robot-arm-c6",
    "crates/robot-arm-cyd-sim",
    "crates/robot-arm-wasm",
    "crates/linkage-blaze",
]
resolver = "3"

[workspace.package]
version = "0.1.4"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
robot-arm-core = { path = "crates/robot-arm-core" }

[profile.dev]
panic = "abort"

[profile.release]
codegen-units = 1
lto = "thin"
panic = "abort"
