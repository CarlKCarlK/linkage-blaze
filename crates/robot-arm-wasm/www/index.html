<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robot Arm</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="viewport" aria-label="Robot arm 3D view">
        <canvas id="arm-canvas"></canvas>
      </section>
      <aside class="controls" aria-label="Robot arm controls">
        <div class="toolbar">
          <button id="reset-view" type="button">Reset View</button>
          <button id="reset-params" type="button">Reset Params</button>
        </div>
        <div id="sliders" class="sliders"></div>
      </aside>
    </main>
    <script type="module" src="./app.js?v=3d-rods-1"></script>
  </body>
</html>
