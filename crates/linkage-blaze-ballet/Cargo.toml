[package]
name = "linkage-blaze-ballet"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "linkage-blaze-ballet"
path = "src/main.rs"
required-features = ["esp32"]

[features]
default = ["esp32", "const-parse"]
# Parse pirouette.bvh at compile time via const fn (~8 s extra build time).
# Without this feature the pre-generated `ballet_frames_precomputed.rs` is used instead.
# Regenerate the pre-generated file with `just generate-ballet`.
const-parse = []
esp32 = [
    "device-envoy-esp/esp32",
    "esp-hal/esp32",
    "esp-rtos/esp32",
    "esp-backtrace/esp32",
    "esp-println/esp32",
    "esp-bootloader-esp-idf/esp32",
]

[dependencies]
embedded-graphics = { version = "0.8", default-features = false }
heapless = "0.9.1"
log = { version = "0.4", default-features = false }
linkage-blaze-core.workspace = true

[target.'cfg(target_os = "none")'.dependencies]
linkage-blaze-cyd = { path = "../linkage-blaze-cyd" }
derive_more = { version = "2.1.1", default-features = false, features = [
    "from",
] }
embassy-executor = "0.10.0"
device-envoy-esp = { version = "0.1.0", default-features = false }
esp-hal = { version = "1.1.0", default-features = false, features = [
    "unstable",
] }
esp-rtos = { version = "0.3.0", default-features = false, features = [
    "embassy",
] }
esp-backtrace = { version = "0.19.0", default-features = false, features = [
    "panic-handler",
    "halt-cores",
    "println",
] }
esp-println = { version = "0.17.0", default-features = false, features = [
    "uart",
    "log-04",
] }
esp-bootloader-esp-idf = { version = "0.5.0", default-features = false }
static_cell = "2.1.1"
