<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CYD Gamma Ramp (sRGB reference)</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #808080; /* neutral mid-gray surround for fair color judgement */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: 13px/1.4 system-ui, sans-serif;
      color: #111;
    }
    /* 2x integer scale with nearest-neighbor so sampled colors stay exact. */
    #screen {
      width: 480px;
      height: 640px;
      image-rendering: pixelated;
    }
    #status { font: 12px monospace; }
  </style>
</head>

<body>
  <canvas id="screen" aria-label="CYD gamma calibration ramp"></canvas>
  <div id="status"></div>
  <script type="module">
    import init, { start_gamma_ramp } from "./pkg/linkage_blaze_skeleton_clock_wasm.js";

    const status = document.querySelector("#status");
    try {
      await init();
      // Linear Rgb565→RGBA on a calibrated monitor: this is the sRGB reference
      // to compare against a photo of the device running the `gamma-ramp` example.
      start_gamma_ramp("screen");
      status.textContent = "gamma ramp (sRGB reference) — sample each patch and compare to the device";
    } catch (error) {
      status.textContent = `load failed: ${String(error)}`;
      throw error;
    }
  </script>
</body>

</html>
