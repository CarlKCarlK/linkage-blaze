<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Printer Simulator</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="viewport" aria-label="3D printer simulation view">
        <canvas id="printer-canvas"></canvas>
      </section>

      <aside class="controls" aria-label="Printer controls">

        <div class="toolbar">
          <label class="file-btn">
            Load G-code
            <input id="file-input" type="file" accept=".gcode,.gco,.g,.nc" />
          </label>
          <button id="reset-btn" type="button">Reset</button>
          <button id="play-btn" type="button" disabled>Play</button>
          <button id="step-btn" type="button" disabled>Step</button>
        </div>

        <div class="section-label">Playback</div>

        <div class="row-2col">
          <label for="speed-slider">Speed</label>
          <span id="speed-display" class="value-display">1 seg/frame</span>
          <input id="speed-slider" class="full-width" type="range" min="1" max="400" value="20" />
        </div>

        <div class="status">
          <div class="status-row">
            <span class="label">Layer</span>
            <span id="layer-display">—</span>
          </div>
          <div class="status-row">
            <span class="label">Progress</span>
            <span id="progress-display">—</span>
          </div>
          <progress id="progress-bar" value="0" max="1"></progress>
        </div>

        <div class="section-label">Visibility</div>

        <div class="toggle-group">
          <label>
            <input id="show-travel" type="checkbox" checked />
            Travel moves
          </label>
          <label>
            <input id="show-printer" type="checkbox" checked />
            Printer structure
          </label>
          <label>
            <input id="show-frame" type="checkbox" checked />
            Print frame
          </label>
        </div>

        <p class="hint">
          Left drag orbits · Right drag pans · Scroll zooms
        </p>

      </aside>
    </main>
    <script type="module" src="./main.js?v=8"></script>
  </body>
</html>
